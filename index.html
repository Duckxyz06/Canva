<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canva Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 32px; max-width: 640px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { color: #7c3fe4; margin-bottom: 8px; font-size: 1.6rem; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
    button { background: #7c3fe4; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 8px; transition: background 0.2s; }
    button:hover { background: #6a2fd3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f0e8ff; color: #7c3fe4; }
    .btn-secondary:hover { background: #e0d0ff; }
    .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .status.error { background: #ffebee; color: #c62828; display: block; }
    .status.info { background: #e3f2fd; color: #1565c0; display: block; }
    .section { margin-top: 24px; border-top: 1px solid #eee; padding-top: 20px; display: none; }
    .section.visible { display: block; }
    .api-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    pre { background: #f8f8f8; border-radius: 6px; padding: 12px; overflow: auto; font-size: 0.78rem; margin-top: 8px; max-height: 280px; }
    .label { font-weight: 600; font-size: 0.85rem; color: #333; margin-bottom: 4px; }
    .token-display { word-break: break-all; font-size: 0.75rem; background: #f0e8ff; padding: 8px; border-radius: 6px; margin-top: 8px; }
    .logout { background: #fff; color: #c62828; border: 1px solid #c62828; margin-top: 16px; }
    .logout:hover { background: #ffebee; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎨 Canva Connect</h1>
    <p class="subtitle">Kết nối tài khoản Canva để truy cập designs, assets, folders và tạo nội dung qua API.</p>

    <div id="loginSection">
      <button id="loginBtn">🔐 Đăng nhập bằng Canva</button>
    </div>

    <div id="status" class="status"></div>

    <div id="userSection" class="section">
      <div class="label">👤 Profile</div>
      <pre id="userInfo">Đang tải...</pre>

      <div class="label" style="margin-top:16px">🔑 Access Token</div>
      <div class="token-display" id="tokenDisplay"></div>

      <div class="section visible">
        <div class="label">📂 Canva API</div>
        <div class="api-grid">
          <button class="btn-secondary" onclick="callApi('profile')">👤 Profile</button>
          <button class="btn-secondary" onclick="callApi('designs')">🖼️ Designs</button>
          <button class="btn-secondary" onclick="callApi('folders')">📁 Folders</button>
          <button class="btn-secondary" onclick="callApi('assets')">🗂️ Assets</button>
          <button class="btn-secondary" onclick="callApi('brandtemplates')">🏷️ Brand Templates</button>
          <button class="btn-secondary" onclick="callApi('comments')">💬 Comments</button>
        </div>
        <pre id="apiResult">Chọn một action trên...</pre>
      </div>

      <button class="logout" onclick="logout()">🚪 Đăng xuất</button>
    </div>
  </div>

  <script>
    const CLIENT_ID = "OC-AZ6a8Gh5dF7d";
    const REDIRECT_URI = "https://duckxyz06.github.io/Canva/";
    const BACKEND = "https://canva-murex.vercel.app/api";

    // Scopes khớp với permissions đã cấp
    const SCOPES = [
      "app:read","app:write",
      "asset:read","asset:write",
      "brandtemplate:content:read","brandtemplate:content:write",
      "brandtemplate:meta:read",
      "comment:read","comment:write",
      "design:content:read","design:content:write",
      "design:meta:read",
      "design:permission:read","design:permission:write",
      "folder:read","folder:write",
      "folder:permission:read","folder:permission:write",
      "profile:read"
    ].join(" ");

    async function generatePKCE() {
      const random = crypto.getRandomValues(new Uint8Array(32));
      const verifier = btoa(String.fromCharCode(...random))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      localStorage.setItem("canva_code_verifier", verifier);
      const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
      const challenge = btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      return challenge;
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const challenge = await generatePKCE();
      const url = "https://www.canva.com/api/oauth/authorize"
        + "?response_type=code"
        + "&client_id=" + encodeURIComponent(CLIENT_ID)
        + "&redirect_uri=" + encodeURIComponent(REDIRECT_URI)
        + "&scope=" + encodeURIComponent(SCOPES)
        + "&code_challenge_method=s256"
        + "&code_challenge=" + challenge;
      location.href = url;
    });

    async function handleCallback() {
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const error = params.get("error");
      if (error) { showStatus("Lỗi xác thực: " + error, "error"); return; }
      if (!code) return;

      showStatus("⏳ Đang đổi code lấy Access Token...", "info");
      const verifier = localStorage.getItem("canva_code_verifier");
      if (!verifier) { showStatus("Không tìm thấy code_verifier. Đăng nhập lại.", "error"); return; }

      history.replaceState({}, "", location.pathname);

      try {
        const res = await fetch(`${BACKEND}/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, code_verifier: verifier, redirect_uri: REDIRECT_URI })
        });
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem("canva_access_token", data.access_token);
          if (data.refresh_token) localStorage.setItem("canva_refresh_token", data.refresh_token);
          localStorage.removeItem("canva_code_verifier");
          showStatus("✅ Đăng nhập thành công!", "success");
          showLoggedIn(data.access_token);
          loadProfile(data.access_token);
        } else {
          showStatus("Lỗi: " + (data.error_description || data.error || JSON.stringify(data)), "error");
        }
      } catch (e) {
        showStatus("Network error: " + e.message, "error");
      }
    }

    function showLoggedIn(token) {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("userSection").classList.add("visible");
      document.getElementById("tokenDisplay").textContent = token.substring(0, 48) + "...";
    }

    async function loadProfile(token) {
      try {
        const res = await fetch(`${BACKEND}/canva?endpoint=users/me`, {
          headers: { "Authorization": "Bearer " + token }
        });
        document.getElementById("userInfo").textContent = JSON.stringify(await res.json(), null, 2);
      } catch (e) {
        document.getElementById("userInfo").textContent = "Lỗi: " + e.message;
      }
    }

    async function callApi(type) {
      const token = localStorage.getItem("canva_access_token");
      if (!token) { showStatus("Chưa đăng nhập", "error"); return; }
      const endpoints = {
        profile: "users/me",
        designs: "designs?limit=10",
        folders: "folders?limit=10",
        assets: "assets?limit=10",
        brandtemplates: "brand-templates?limit=10",
        comments: "designs?limit=5"
      };
      document.getElementById("apiResult").textContent = "⏳ Đang tải...";
      try {
        const res = await fetch(`${BACKEND}/canva?endpoint=${encodeURIComponent(endpoints[type])}`, {
          headers: { "Authorization": "Bearer " + token }
        });
        document.getElementById("apiResult").textContent = JSON.stringify(await res.json(), null, 2);
      } catch (e) {
        document.getElementById("apiResult").textContent = "Lỗi: " + e.message;
      }
    }

    function logout() {
      localStorage.removeItem("canva_access_token");
      localStorage.removeItem("canva_refresh_token");
      location.reload();
    }

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + type;
    }

    window.addEventListener("load", () => {
      const token = localStorage.getItem("canva_access_token");
      if (token) { showLoggedIn(token); loadProfile(token); }
      else { handleCallback(); }
    });
  </script>
</body>
</html>
